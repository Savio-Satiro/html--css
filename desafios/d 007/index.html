<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon (1).ico" type="image/x-icon">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <P>Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar a melhor experiência!</P>
    <picture>
        <source media="(max-width:750px)" srcset="paisagem-p.png" type="image/png">
        <source srcset="paisagem-m.png" media="(max-width:1200px)" type="image/png">
        <img src="paisagem-g.png" alt="Imagem grande">
    </picture>
</body>
</html>
