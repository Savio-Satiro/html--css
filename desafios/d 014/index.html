<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 600px;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        .media{
            text-align: left;
        }

        .color{
            background-color: gray;
            color: white;
        }
        
    </style>
</head>
<body>
    <table>
        <thead>
            <tr class="color">
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplina</th> 
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr class="color">
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="4">Exatas</th>
                <td>Matemática</td>
                <td>8</td>
                <td>9</td>
                <td>8,5</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>7</td>
                <td>8</td>
                <td>7,5</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>9</td>
                <td>8</td>
                <td>8,5</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>8</td>
                <td>7</td>
                <td>7,5</td>
            </tr>
            <tr class="color">
                <th scope="row" colspan="4" class="media">Média de Exatas</th>
                <td>8</td>
            </tr>
            <tr>
                <th scope="rowgroup" rowspan="2">Humanas</th>
                <td>História</td>
                <td>9</td>
                <td>8</td>
                <td>8,5</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>8</td>
                <td>7</td>
                <td>7,5</td>
            </tr>
            <tr class="color">
                <th scope="row" colspan="4" class="media">Média de Humanas</th>
                <td>8</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
