<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 500px;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid black;
            padding: 8px;
        }

        caption{
            font-size: 1.3em;
            padding: 8px;
            font-weight: bolder;
        }

        .verde{
            background-color: chartreuse;
        }
        .cgrupo{
            background-color: yellow;
        }

    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>

    <table>
        <colgroup>
            <col class="verde">
            <col class="cgrupo" span="2">
            <col class="verde">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>Feminino</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Beatriz Souza</td>
            <td>Feminino</td>
            <td>30</td>
            <td>Advogada</td>
        </tr>
        <tr>
            <td>Cláudia Melo</td>
            <td>Feminino</td>
            <td>28</td>
            <td>Engenheira</td>
        </tr>
        <tr>
            <td>Gustavo</td>
            <td>Masculino</td>
            <td>35</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td>Bruno Mendonça</td>
            <td>Masculino</td>
            <td>32</td>
            <td>Médico</td>
        </tr>
        <tr>
            <td>Daniel Lourenço</td>
            <td>Masculino</td>
            <td>29</td>
            <td>Arquiteto</td>
        </tr>
    </table>
</body>
</html>
